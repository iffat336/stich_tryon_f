[build]
  publish = "."

[dev]
  command = "python -m http.server 8000"
  port = 8000

[[redirects]]
  from = "/collections"
  to = "/collections.html"
  status = 200

[[redirects]]
  from = "/product"
  to = "/product.html"
  status = 200

[[redirects]]
  from = "/try-on"
  to = "/try-on.html"
  status = 200

[[redirects]]
  from = "/cart"
  to = "/cart.html"
  status = 200

[[redirects]]
  from = "/flow"
  to = "/flow.html"
  status = 200

[[redirects]]
  from = "/wishlist"
  to = "/wishlist.html"
  status = 200

[[redirects]]
  from = "/tryon"
  to = "/try-on.html"
  status = 200

[[redirects]]
  from = "/404"
  to = "/404.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
